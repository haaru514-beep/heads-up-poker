<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heads-Up Poker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="loginView" class="auth">
        <div class="brand">
          <svg class="paw-logo" viewBox="0 0 180 160" role="img" aria-label="肉球ロゴ">
            <defs>
              <linearGradient id="pawGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#ffad36" />
                <stop offset="1" stop-color="#ff7800" />
              </linearGradient>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
                <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#f27a00" flood-opacity="0.22" />
              </filter>
            </defs>
            <path class="paw-stroke" d="M24 132c14 10 35 15 66 15s52-5 66-15" />
            <ellipse class="paw-fill toe toe-a" cx="32" cy="71" rx="23" ry="30" />
            <ellipse class="paw-fill toe toe-b" cx="68" cy="36" rx="24" ry="32" />
            <ellipse class="paw-fill toe toe-c" cx="112" cy="36" rx="24" ry="32" />
            <ellipse class="paw-fill toe toe-d" cx="148" cy="71" rx="23" ry="30" />
            <path class="paw-fill pad" d="M46 103c0-34 20-50 44-50s44 16 44 50c0 28-18 43-44 43s-44-15-44-43z" />
            <text x="90" y="95" text-anchor="middle">NEKOKAJI</text>
            <text x="90" y="118" text-anchor="middle">HEADS UP</text>
            <text x="90" y="136" text-anchor="middle">POKER</text>
          </svg>
          <span>NEKOKAJI</span>
          <strong>HEADS UP<br />POKER</strong>
          <svg class="cat-peek" viewBox="0 0 220 120" aria-hidden="true">
            <path class="cat-body" d="M63 106c-2-30 13-61 45-67 37-7 70 15 72 52 1 13-2 23-9 31H66c-2-5-3-10-3-16z" />
            <path class="cat-ear-shape left" d="M72 53 54 12c-2-5 3-10 8-7l38 24z" />
            <path class="cat-ear-shape right" d="m148 29 38-24c5-3 10 2 8 7l-18 41z" />
            <path class="cat-tail" d="M174 86c24-7 27-38 12-50" />
            <circle class="cat-eye" cx="91" cy="75" r="10" />
            <circle class="cat-eye" cx="130" cy="75" r="10" />
            <circle class="cat-pupil" cx="91" cy="75" r="4" />
            <circle class="cat-pupil" cx="130" cy="75" r="4" />
            <path class="cat-nose" d="M108 89h7" />
            <path class="cat-whisker" d="M74 88h-25M76 97 50 106M146 88h25M144 97l26 9" />
            <path class="cat-paw" d="M60 116c2-13 12-20 24-16v16M137 116v-16c12-4 22 3 24 16" />
          </svg>
        </div>
        <form id="loginForm" class="login-form">
          <input id="loginIdInput" autocomplete="username" placeholder="ユーザーID" required minlength="2" />
          <input id="nameInput" placeholder="表示名" required minlength="2" />
          <input id="passwordInput" autocomplete="current-password" type="password" placeholder="パスワード" required minlength="4" />
          <button class="primary" type="submit">入る</button>
        </form>
      </section>

      <section id="mainView" class="hidden">
        <header class="topbar">
          <div>
            <span class="eyebrow">Logged in</span>
            <strong id="userName">-</strong>
          </div>
          <label class="icon-upload">
            <input id="profileIconInput" type="file" accept="image/*" />
            <span id="profileIconPreview" class="player-icon default-cat"></span>
            <strong>アイコン変更</strong>
          </label>
          <button id="logoutButton" type="button">ログアウト</button>
        </header>

        <section id="lobbyView" class="lobby">
          <div class="action-grid">
            <button id="createPvpButton" class="primary" type="button">ユーザー対戦の部屋を作る</button>
            <button id="createCpuButton" type="button">CPU練習を始める</button>
          </div>
          <section class="settings-panel">
            <div class="section-title">通常部屋の設定</div>
            <label>
              <span>初期点</span>
              <input id="casualStackInput" type="number" min="100" step="100" value="1000" />
            </label>
            <label>
              <span>SB</span>
              <input id="casualSmallBlindInput" type="number" min="1" step="5" value="10" />
            </label>
            <label>
              <span>BB</span>
              <input id="casualBigBlindInput" type="number" min="2" step="10" value="20" />
            </label>
            <label>
              <span>ブラインド時間(分)</span>
              <input id="casualLevelMinutesInput" type="number" min="1" step="1" value="15" />
            </label>
          </section>
          <form id="joinForm" class="join-form">
            <input id="roomCodeInput" placeholder="部屋コード" maxlength="6" />
            <button type="submit">参加</button>
          </form>
          <section class="admin-panel">
            <div class="section-title">管理者</div>
            <form id="adminLoginForm" class="admin-login">
              <input id="adminPasscodeInput" type="password" placeholder="管理者パスコード" />
              <button type="submit">管理者ログイン</button>
            </form>
            <form id="adminRoomForm" class="admin-room hidden">
              <input id="tournamentTitleInput" placeholder="大会名" />
              <label>
                <span>初期点</span>
                <input id="tournamentStackInput" type="number" min="100" step="100" value="1000" />
              </label>
              <label>
                <span>ストラクチャー</span>
                <textarea id="structureInput" rows="4">10/20/15
20/40/15
30/60/15
50/100/15</textarea>
              </label>
              <button class="primary" type="submit">大会部屋を作成</button>
            </form>
            <ol id="adminRoomList" class="admin-room-list"></ol>
          </section>
          <section class="history">
            <div class="section-title">対戦履歴</div>
            <ol id="historyList"></ol>
          </section>
        </section>

        <section id="roomView" class="room hidden">
          <nav class="roombar">
            <button id="backButton" type="button">部屋を出る</button>
            <div>
              <span class="eyebrow">部屋</span>
              <strong id="roomCode">------</strong>
            </div>
            <button id="copyButton" type="button">コードコピー</button>
          </nav>

          <section class="table">
            <div class="seat top-seat">
              <div class="seat-meta">
                <span id="p2Icon" class="player-icon default-cat"></span>
                <span id="p2Name">Player 2</span>
                <small id="p2UserId"></small>
                <strong id="p2Stack">1000</strong>
              </div>
              <div id="p2Cards" class="cards"></div>
              <div id="p2Bet" class="chip">ベット 0</div>
            </div>

            <div class="board">
              <div id="communityCards" class="cards community"></div>
              <p id="messageText">始めるを押してください</p>
              <span id="blindText"></span>
              <strong id="potText">ポット 0</strong>
            </div>

            <div class="seat bottom-seat">
              <div id="p1Bet" class="chip">ベット 0</div>
              <div id="p1Cards" class="cards"></div>
              <div class="seat-meta">
                <span id="p1Icon" class="player-icon default-cat"></span>
                <span id="p1Name">Player 1</span>
                <small id="p1UserId"></small>
                <strong id="p1Stack">1000</strong>
              </div>
            </div>
          </section>

          <section class="controls">
            <button id="dealButton" class="primary" type="button">始める</button>
            <button id="callButton" type="button">チェック</button>
            <button id="raiseButton" type="button">ベット</button>
            <button id="foldButton" type="button">フォールド</button>
            <label class="amount-control">
              <span>金額</span>
              <input id="raiseInput" type="range" min="20" max="1000" step="10" value="40" />
              <strong id="raiseValue">40</strong>
            </label>
          </section>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
